<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Profile - VOCO</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #4CAF50, #2196F3);
            /* Gradient background */
        }
        
        .profile-card {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
            width: 350px;
            text-align: center;
        }
        
        .profile-card h2 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .profile-card p {
            margin: 10px 0;
            font-size: 16px;
        }
        
        .profile-card nav {
            margin-top: 20px;
        }
        
        .profile-card nav a {
            color: #2196F3;
            text-decoration: none;
            margin: 0 10px;
            font-weight: bold;
        }
        
        .profile-card nav a:hover {
            text-decoration: underline;
        }
        
        .logout-btn {
            margin-top: 20px;
            padding: 10px;
            width: 100%;
            background: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .logout-btn:hover {
            background: #2196F3;
        }
    </style>
</head>

<body>

    <section class="profile-card">
        <img src="profile1.jpg" alt="Profile Avatar" class="Avatar">
        <h2>Stephen Rey Jakosalem</h2>
        <p class="email">stephen.jakosalem@gmail.com</p>
        <p class="address">Poblacion ondol, loboc, Bohol</p>
    </section>====

    <script>
        // Display user info from session
        window.onload = function() {
            const name = sessionStorage.getItem("name") || "Guest";
            const email = sessionStorage.getItem("email") || "N/A";
            const role = sessionStorage.getItem("role") || "N/A";
            document.getElementById("profileInfo").innerHTML =
                `<p><strong>Name:</strong> ${name}</p>
         <p><strong>Email:</strong> ${email}</p>
         <p><strong>Role:</strong> ${role}</p>`;
        };

        function logout() {
            sessionStorage.clear();
            window.location.href = "index.html"; // back to landing page
        }
    </script>
</body>

</html>
