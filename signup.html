<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - MyApp</title>
    <link rel="stylesheet" href="style.css">
    <script>
        function validateSignup() {
            const email = document.getElementById("signup-email").value;
            const password = document.getElementById("signup-password").value;
            const confirm = document.getElementById("confirm-password").value;

            if (email === "" || password === "" || confirm === "") {
                alert("All fields are required.");
                return false;
            }
            if (!email.includes("@")) {
                alert("Invalid email format.");
                return false;
            }
            if (password.length < 6) {
                alert("Password must be at least 6 characters.");
                return false;
            }
            if (password !== confirm) {
                alert("Passwords do not match.");
                return false;
            }
            return true;
        }
    </script>
</head>

<body>
    <header class="navbar">
        <div class="logo">MyApp</div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <main class="content container">
        <section class="card info-box signup-card">
            <h2>Create Account</h2>
            <form action="profile.html" method="post" onsubmit="return validateSignup()">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signup-email" name="email" placeholder="Enter email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signup-password" name="password" placeholder="Enter password">
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm" placeholder="Confirm password">
                </div>
                <button type="submit" class="cta-button">Sign Up</button>
            </form>
        </section>
    </main>
</body>

</html>
