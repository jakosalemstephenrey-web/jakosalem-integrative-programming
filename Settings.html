<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Settings - VOCO</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            font-family: 'Roboto', Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to right, #4CAF50, #2196F3);
            /* Gradient background */
        }
        
        .settings-card {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
            width: 350px;
        }
        
        .settings-card h2 {
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }
        
        .settings-card label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        
        .settings-card input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        
        .settings-card button {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .settings-card button:hover {
            background: #2196F3;
        }
        
        .settings-card nav {
            margin-top: 20px;
            text-align: center;
        }
        
        .settings-card nav a {
            color: #2196F3;
            text-decoration: none;
            margin: 0 10px;
        }
        
        .settings-card nav a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="settings-card">
        <h2>Settings</h2>
        <form>
            <label>Update Email:
        <input type="email" placeholder="Enter new email">
      </label>
            <label>Change Password:
        <input type="password" placeholder="Enter new password">
      </label>
            <button type="submit">Save Changes</button>
        </form>
        <nav>
            <a href="profile.html">Back to Profile</a> |
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </div>

    <script>
        function logout() {
            sessionStorage.clear();
            window.location.href = "index.html"; // back to landing page
        }
    </script>
</body>

</html>
